spring.application.name=OnlineExaminationSystem

# MySQL Connection Configuration Settings
spring.datasource.url=jdbc:mysql://localhost:3306/exam_sphere?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate Lifecycle Rules
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Runtime Parameters
server.port=8080

